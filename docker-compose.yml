version: "3"

# Host port 3185 is reserved for this stack (avoids 80/443/3000/8011/etc).
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: termeh-pmas-api:latest
    env_file:
      - .env
    environment:
      APP_ENV: production
      PORT: "8080"
      COOKIE_SECURE: "false"
      CORS_ALLOWED_ORIGINS: "*"
    expose:
      - "8080"
    restart: unless-stopped

  web:
    build:
      context: ./pmas-live
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ""
        API_INTERNAL_URL: http://api:8080
    image: termeh-pmas-web:latest
    environment:
      NODE_ENV: production
      API_INTERNAL_URL: http://api:8080
    expose:
      - "3000"
    depends_on:
      - api
    restart: unless-stopped

  gateway:
    image: nginx:1.27-alpine
    ports:
      - "3185:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - web
    restart: unless-stopped
